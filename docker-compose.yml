

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: multi-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multi-agent-network

  backend:
    build: .
    container_name: multi-agent-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-multi_agent}
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - multi-agent-network

  frontend:
    build: ./streamlit-frontend
    container_name: multi-agent-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:3000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - multi-agent-network


volumes:
  postgres_data:

networks:
  multi-agent-network:
    driver: bridge