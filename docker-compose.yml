

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: multi-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multi-agent-network


volumes:
  postgres_data:

networks:
  multi-agent-network:
    driver: bridge